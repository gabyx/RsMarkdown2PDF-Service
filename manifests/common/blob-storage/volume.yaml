---
kind: PersistentVolume
apiVersion: v1
metadata:
  name: blob-storage
  namespace: md2pdf
  labels:
    type: local
spec:
  storageClassName: manual
  capacity:
    storage: 200M
  accessModes:
    - ReadWriteMany
  hostPath:
    path: "/mnt/blob-storage"

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: blob-storage-claim
  namespace: md2pdf
spec:
  storageClassName: manual
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 200M
